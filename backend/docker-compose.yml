services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=kudosquest;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Strava__ClientId: ${STRAVA_CLIENT_ID}
      Strava__ClientSecret: ${STRAVA_CLIENT_SECRET}
      Strava__RedirectUri: ${STRAVA_REDIRECT_URI:-http://localhost:8080/api/auth/callback}
      Jwt__Issuer: ${JWT_ISSUER:-kudosquest}
      Jwt__Audience: ${JWT_AUDIENCE:-kudosquest}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-10080}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kudosquest}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
